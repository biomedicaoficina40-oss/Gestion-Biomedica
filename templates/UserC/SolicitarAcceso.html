{% extends './base.html' %}

{% block title %}Solicitar Equipo{% endblock %}

{% block customCSS %}
<style>
    .card-img-request {
        max-height: 300px;
        object-fit: cover;
        width: 100%;
    }

    .form-request-container {
        background-color: #f8f9fa;
        border-radius: 10px;
        padding: 30px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .form-label {
        font-weight: bold;
        color: #495057;
    }

    .btn-submit-request {
        transition: all 0.3s ease;
    }

    .btn-submit-request:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    #image-preview {
        max-height: 300px;
        object-fit: cover;
        width: 100%;
        display: none;
        margin-top: 15px;
        border-radius: 10px;
    }

    .custom-file-input {
        cursor: pointer;
    }
</style>
{% endblock %}

{% block body %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card form-request-container">
                <form id="requestForm" action="{{ url_for('equipos.Solicitar_Acceso') }}" method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label for="motivo" class="form-label">Motivo de Solicitud</label>
                        <textarea class="form-control" id="motivo" name="motivo" rows="3" placeholder="Describe el propósito de solicitar este equipo" required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="imagen" class="form-label">Subir Imagen de la credencial</label>
                        <input type="file" class="form-control custom-file-input" id="imagen" name="imagen" accept="image/*" required>
                        <img id="image-preview" src="#" alt="Vista previa de la imagen">
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-submit-request">
                            <i class="fas fa-paper-plane me-2"></i>Enviar Solicitud
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('requestForm');
    const motivoInput = document.getElementById('motivo');
    const imagenInput = document.getElementById('imagen');
    const imagePreview = document.getElementById('image-preview');

    // Image preview functionality
    imagenInput.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    // Form validation
    form.addEventListener('submit', function(event) {
        // Trim inputs to check for whitespace-only content
        if (motivoInput.value.trim() === '') {
            alert('Por favor, proporcione un motivo para la solicitud');
            event.preventDefault();
            return;
        }

        if (imagenInput.files.length === 0) {
            alert('Por favor, suba una imagen');
            event.preventDefault();
            return;
        }

        // Validate image type
        const allowedTypes = ['image/jpeg', 'image/png', 'image/gif'];
        const file = imagenInput.files[0];
        if (!allowedTypes.includes(file.type)) {
            alert('Por favor, suba una imagen válida (JPEG, PNG o GIF)');
            event.preventDefault();
            return;
        }

        // Validate image size (e.g., max 5MB)
        const maxSizeInBytes = 5 * 1024 * 1024; // 5MB
        if (file.size > maxSizeInBytes) {
            alert('La imagen no debe superar 5MB');
            event.preventDefault();
            return;
        }
    });
});
</script>
{% endblock %}
